name: .env
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.10
  - pip
  - pytorch=2.3.1
  - torchvision=0.18.1
  - torchaudio=2.3.1
  - pytorch-cuda=12.1
  - scikit-learn=1.3.2
  - open-clip-torch=2.24.0
  - matplotlib
  - transformers
  - notebook
  - pytorch-lightning
  - pip:
      - -r requirements.txt